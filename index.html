<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Ricko & Antoine - Wedding</title>
</head>
<body>
    <!-- Tab Navigation -->
    <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab(event, 'home')">Home</button>
        <button class="tab-btn" onclick="switchTab(event, 'map')">Map</button>
        <button class="tab-btn" onclick="switchTab(event, 'info')">Info</button>
    </div>

    <!-- Tab 1: Home with Background Image -->
    <div id="home" class="tab-content active">
    </div>

    <!-- Tab 2: Google Map -->
    <div id="map" class="tab-content">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3164.54938975664!2d4.363485315610498!3d43.83651897917381!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x12b37f50d09d105d%3A0x73ed7e6fa5d0c6dd!2sMas%20de%20Ponges%2C%201570%20Rte%20d'Anduze%2C%2030900%20N%C3%AEmes!5e0!3m2!1sen!2sfr!4v1618919234567" allowfullscreen="" loading="lazy"></iframe>
    </div>

    <!-- Tab 3: Info -->
    <div id="info" class="tab-content">
        <div class="info-box">
            <h1>Wedding Details</h1>
            <p><strong>Date:</strong> Saturday, 9th May 2026</p>
            <p><strong>Time:</strong> 4:00 PM</p>
            <p><strong>Location:</strong> Mas de Ponges, 1570 Rte d'Anduze, 30900 Nîmes, France</p>
            <p><strong>Events:</strong> Ceremony, Cocktail, Dinner & Dancing</p>
        </div>
    </div>

    <script>
        function switchTab(evt, tabName) {
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => tab.classList.remove('active'));
            
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
