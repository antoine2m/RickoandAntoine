<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Wedding Invite</title>
</head>
<body>
    <div class="tabs">
        <button class="tablinks" onclick="openTab(event, 'invite')">Invite</button>
        <button class="tablinks" onclick="openTab(event, 'map')">Map</button>
        <button class="tablinks" onclick="openTab(event, 'details')">Details/RSVP</button>
    </div>

    <div id="invite" class="tabcontent">
        <h1>Ricko & Antoine</h1>
        <p>Date: 9th May 2026 at 4pm</p>
        <p>Location: Mas de Ponges 1570 Rte d'Anduze, 30900 Nîmes</p>
        <p>WE ARE EXCITED TO INVITE YOU TO CELEBRATE OUR MARRIAGE WITH WEDDING CEREMONY, COCKTAIL, DINNER AND DANCING</p>
    </div>

    <div id="map" class="tabcontent">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3164.54938975664!2d4.363485315610498!3d43.83651897917381!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x12b37f50d09d105d%3A0x73ed7e6fa5d0c6dd!2sMas%20de%20Ponges!5e0!3m2!1sen!2sfr!4v1671358155802!5m2!1sen!2sfr" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </div>

    <div id="details" class="tabcontent">
        <h2>Details/RSVP</h2>
        <p>More details will be provided here...</p>
    </div>

    <script>
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tabcontent");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
        }
        tablinks = document.getElementsByClassName("tablinks");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }
    </script>
</body>
</html>
